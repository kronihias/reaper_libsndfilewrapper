name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (used for upload)'
        required: true
        default: 'test'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64       # native x86_64
            tag: win64
          - arch: arm64     # cross-compiled from the x64 host (VS ARM64 toolset)
            tag: winarm64
    env:
      WINDOWS_CODESIGN_PFX: ${{ secrets.WINDOWS_CODESIGN_PFX }}
      WINDOWS_CODESIGN_SUBJECT: ${{ secrets.WINDOWS_CODESIGN_SUBJECT }}
      WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get version
      id: version
      run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Inno Setup
      run: |
        choco install innosetup

    - name: Setup Windows code signing
      if: env.WINDOWS_CODESIGN_PFX != ''
      run: |
        @"
        WINDOWS_CODESIGN_SUBJECT=${env:WINDOWS_CODESIGN_SUBJECT}
        WINDOWS_CODESIGN_PFX=${env:WINDOWS_CODESIGN_PFX}
        WINDOWS_CODESIGN_PFX_PASSWORD=${env:WINDOWS_CODESIGN_PFX_PASSWORD}
        "@ | Out-File -FilePath scripts/codesign.env -Encoding ASCII
      shell: pwsh

    - name: Build Windows installer (unsigned)
      if: env.WINDOWS_CODESIGN_PFX == ''
      run: |
        cd scripts
        .\build_win.bat --arch ${{ matrix.arch }} --no-sign
      shell: cmd

    - name: Build Windows installer (signed)
      if: env.WINDOWS_CODESIGN_PFX != ''
      run: |
        cd scripts
        .\build_win.bat --arch ${{ matrix.arch }}
      shell: cmd

    - name: Check Windows installer
      run: |
        if not exist ".\_WIN_RELEASE\reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_${{ matrix.tag }}_setup.exe" (
          echo Windows installer not found
          exit /b 1
        )
      shell: cmd

    - name: Upload Windows installer as artifact
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer-${{ matrix.tag }}
        path: ./_WIN_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_${{ matrix.tag }}_setup.exe

    - name: Upload Windows installer
      if: github.event_name == 'release'
      run: gh release upload ${{ github.event.inputs.tag_name || github.event.release.tag_name }} ./_WIN_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_${{ matrix.tag }}_setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    # Job-level env so the codesigning secrets are visible to every step's
    # `if:` condition. (A variable defined only in a step's own `env:` block is
    # NOT available to that same step's `if:`, which previously caused the
    # cert-import step to be skipped while the build step still tried to sign,
    # failing with "codesign: no identity found".)
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      CODESIGN_CERTIFICATE_P12: ${{ secrets.CODESIGN_CERTIFICATE_P12 }}
      CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
      CODESIGN_APP: ${{ secrets.CODESIGN_APP }}
      CODESIGN_INSTALLER: ${{ secrets.CODESIGN_INSTALLER }}
      NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
      NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
      NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get version
      id: version
      run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: |
        brew install cmake

    - name: Setup code signing
      if: env.CODESIGN_CERTIFICATE_P12 != ''
      run: |
        # Create keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Import certificate
        echo "$CODESIGN_CERTIFICATE_P12" | base64 --decode > certificate.p12
        security import certificate.p12 -P "$CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # Create codesign.env file
        cat > scripts/codesign.env << EOF
        CODESIGN_APP="$CODESIGN_APP"
        CODESIGN_INSTALLER="$CODESIGN_INSTALLER"
        NOTARIZE_APPLE_ID="$NOTARIZE_APPLE_ID"
        NOTARIZE_PASSWORD="$NOTARIZE_PASSWORD"
        NOTARIZE_TEAM_ID="$NOTARIZE_TEAM_ID"
        EOF

    - name: Build macOS installer
      run: |
        cd scripts
        if [ -n "$CODESIGN_CERTIFICATE_P12" ]; then
          ./build_osx.sh
        else
          ./build_osx.sh --no-sign
        fi

    - name: Check macOS installer
      run: |
        if [ ! -f "./_OSX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_macos.pkg" ]; then
          echo "macOS installer not found"
          exit 1
        fi

    - name: Upload macOS installer as artifact
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: macos-installer
        path: ./_OSX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_macos.pkg

    - name: Upload macOS installer
      if: github.event_name == 'release'
      run: gh release upload ${{ github.event.inputs.tag_name || github.event.release.tag_name }} ./_OSX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_macos.pkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest       # x86_64
            arch: x86_64
          - runner: ubuntu-24.04-arm    # native aarch64 runner
            arch: aarch64
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get version
      id: version
      run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Build Linux tarball
      run: |
        cd scripts
        ./build_linux.sh

    - name: Check Linux tarball
      run: |
        if [ ! -f "./_LINUX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_linux_${{ matrix.arch }}.tar.gz" ]; then
          echo "Linux tarball not found"
          exit 1
        fi

    - name: Upload Linux tarball as artifact
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: linux-tarball-${{ matrix.arch }}
        path: ./_LINUX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_linux_${{ matrix.arch }}.tar.gz

    - name: Upload Linux tarball
      if: github.event_name == 'release'
      run: gh release upload ${{ github.event.inputs.tag_name || github.event.release.tag_name }} ./_LINUX_RELEASE/reaper_libsndfilewrapper_v${{ steps.version.outputs.version }}_linux_${{ matrix.arch }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
